<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Building Care System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>🏢 BCS</h2>
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="report.html" class="active">Reports</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>Reports</h1>
        <div>
          <button class="btn btn-primary" id="generateReportBtn">Generate Report</button>
          <button class="btn btn-secondary" id="exportReportBtn">Export</button>
        </div>
      </div>

      <div class="form" style="margin-bottom: 2rem;">
        <form id="filterForm">
          <div class="form-group">
            <label for="reportType">Report Type</label>
            <select id="reportType" name="reportType">
              <option value="">All Types</option>
              <option value="maintenance">Maintenance</option>
              <option value="inspection">Inspection</option>
              <option value="incident">Incident</option>
            </select>
          </div>
          <div class="form-group">
            <label for="buildingId">Building</label>
            <select id="buildingId" name="buildingId">
              <option value="">All Buildings</option>
              <option value="bld001">Building A</option>
              <option value="bld002">Building B</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Filter</button>
        </form>
      </div>

      <div id="reportsContainer">
        <p>Loading reports...</p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
