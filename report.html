<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Laporan Kerusakan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/report.css">

</head>

<body>

<div class="sidebar">

<div class="brand">

<img src="assets/logo.png" class="brand-logo">

<h4>BCS</h4>

</div>

<a href="dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

<a class="active" href="report.html">

<i class="bi bi-file-earmark-plus"></i>

Laporan

</a>

<a href="history.html">

<i class="bi bi-clock-history"></i>

Riwayat

</a>

<a href="profile.html">

<i class="bi bi-person"></i>

Profil

</a>

<button class="btn btn-danger mt-auto" onclick="logout()">

Logout

</button>

</div>

<div class="main-content">

<div class="page-header">

<h2>Buat Laporan Kerusakan</h2>

<p>Isi formulir berikut.</p>

</div>

<div class="report-card">

<form id="reportForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Nama Pelapor</label>

<input
id="nama"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Departemen</label>

<input
id="departemen"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Lokasi</label>

<input
id="lokasi"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Kategori</label>

<select
id="kategori"
class="form-select">

<option>AC</option>

<option>LISTRIK</option>

<option>AIR</option>

</select>

</div>

<div class="mb-3">

<label>Deskripsi</label>

<textarea

id="deskripsi"

class="form-control"

rows="4"

required>

</textarea>

</div>

<div class="mb-3">

<label>Upload Foto</label>

<input

type="file"

id="photo"

class="form-control"

accept="image/*">

</div>

<img

id="preview"

class="preview-image">

<button

class="btn btn-primary mt-4 w-100"

id="btnSave">

Kirim Laporan

</button>

</form>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/services/report.service.js"></script>
<script src="js/report.js"></script>

</body>

</html>
