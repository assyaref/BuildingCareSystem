<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Building Care System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="brand">

            <img src="assets/logo.png" class="brand-logo">

            <h2>BCS</h2>

        </div>

        <nav>

            <a href="dashboard.html" class="active">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="report.html">

                <i class="bi bi-file-earmark-plus"></i>

                Laporan

            </a>

            <a href="history.html">

                <i class="bi bi-clock-history"></i>

                Riwayat

            </a>

            <a href="profile.html">

                <i class="bi bi-person-circle"></i>

                Profil

            </a>

        </nav>

        <button
            class="btn btn-danger logout-btn"
            onclick="logout()">

            Logout

        </button>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <div class="page-header">

            <h1>Dashboard</h1>

            <p id="welcome"></p>

        </div>

        <!-- Statistik -->

        <div class="row g-4">

            <div class="col-lg-3 col-md-6">

                <div class="stat-card">

                    <small>Total</small>

                    <h2 id="total">0</h2>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stat-card">

                    <small>AC</small>

                    <h2 id="ac">0</h2>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stat-card">

                    <small>Listrik</small>

                    <h2 id="listrik">0</h2>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="stat-card">

                    <small>Air</small>

                    <h2 id="air">0</h2>

                </div>

            </div>

        </div>

        <!-- Status -->

        <div class="row g-4 mt-2">

            <div class="col-lg-4">

                <div class="status-card bg-danger">

                    <small>OPEN</small>

                    <h1 id="open">0</h1>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="status-card bg-warning text-dark">

                    <small>PROGRESS</small>

                    <h1 id="progress">0</h1>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="status-card bg-success">

                    <small>DONE</small>

                    <h1 id="done">0</h1>

                </div>

            </div>

        </div>

        <!-- Last Update -->

        <div class="mt-4">

            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <small class="text-muted">

                        Last Update

                    </small>

                    <div id="lastUpdate">

                        -

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- Loader -->

    <div id="loader"></div>

    <!-- Toast -->

    <div id="toast-container"></div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core -->

    <script src="js/config.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/utils.js"></script>

    <!-- Components -->

    <script src="js/components/loader.js"></script>

    <script src="js/components/toast.js"></script>

    <!-- Services -->

    <script src="js/services/dashboard.service.js"></script>

    <!-- Page -->

    <script src="js/pages/dashboard.js"></script>

</body>

</html>
